<nav class="navbar scoreboard-nav">
  <div class="scoreboard-nav__inner">
    <a class="navbar-brand" href="{{ url_for('home_page') }}" aria-label="ScoreBore home">
      <img
        class="navbar-brand__logo"
        src="{{ url_for('static', filename='images/logo.png') }}"
        alt=""
        width="56"
        height="56"
        loading="eager"
      >
      <span class="navbar-brand__text" aria-hidden="true">
        <span class="navbar-brand__score">Score</span><span class="navbar-brand__bore">bore</span>
      </span>
    </a>
    {% include "partials/sport_nav.html" %}
    {% if active_sport | default('all') in ['mlb', 'all', 'world_cup'] %}
    <div
      class="scoreboard-search"
      data-scoreboard-search
      data-search-api="{{ url_for('api_search') }}"
    >
      <label class="scoreboard-search__label" for="scoreboard-search-input">Search teams or players</label>
      <span class="scoreboard-search__icon bi bi-search" aria-hidden="true"></span>
      <input
        type="search"
        id="scoreboard-search-input"
        class="scoreboard-search__input"
        placeholder="Search teams or players…"
        autocomplete="off"
        spellcheck="false"
        role="combobox"
        aria-autocomplete="list"
        aria-expanded="false"
        aria-controls="scoreboard-search-results"
      >
      <div
        id="scoreboard-search-results"
        class="scoreboard-search__results"
        role="listbox"
        hidden
      ></div>
    </div>
    {% endif %}
  </div>
</nav>
{% if active_sport | default('all') in ['mlb', 'all', 'world_cup'] %}
<script src="{{ url_for('static', filename='js/scoreboard-search.js') }}" defer></script>
{% endif %}
