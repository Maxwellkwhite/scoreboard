<nav class="sport-nav" aria-label="Choose sport">
  <a
    class="sport-nav__link{% if active_sport | default('all') == 'all' %} sport-nav__link--active{% endif %}"
    href="{{ url_for('home_page') }}"
    {% if active_sport | default('all') == 'all' %}aria-current="page"{% endif %}
  >All</a>
  <a
    class="sport-nav__link{% if active_sport == 'mlb' %} sport-nav__link--active{% endif %}"
    href="{{ url_for('mlb_scoreboard') }}"
    {% if active_sport == 'mlb' %}aria-current="page"{% endif %}
  >MLB</a>
  <a
    class="sport-nav__link{% if active_sport == 'world_cup' %} sport-nav__link--active{% endif %}"
    href="{{ url_for('world_cup_scoreboard') }}"
    {% if active_sport == 'world_cup' %}aria-current="page"{% endif %}
  >World Cup</a>
</nav>
